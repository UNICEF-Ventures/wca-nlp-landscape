id: lyngual-labs
name: Lyngual Labs
type: startup
website: https://lynguallabs.org/
location: Nigeria
founded: 2024
organization_size: small
description: >
  Nigerian AI research lab building speech and NLP models for Nigerian languages,
  with a focus on Yoruba. Operates under LynguaTech Innovative Foundation. Has created
  paid opportunities for 500+ voice contributors and built a community of 289 data
  annotators. Notable work on Yoruba-English code-switched ASR, TTS accessibility
  evaluation for visually impaired learners, and multimodal LLM evaluation on Nigerian
  exam content (WAEC/NECO).

