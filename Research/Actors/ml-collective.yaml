unicef_relevance: >
  AfriCaption covers 8 UNICEF focus languages including Yoruba, Igbo, Hausa, Ewe,
  Lingala, Nigerian Fulfulde, Dyula, and Bambara — the broadest WCA language coverage
  of any single project. Multimodal AI (image captioning) could support visual content
  accessibility. Provides research mentorship pipeline for African NLP talent.

