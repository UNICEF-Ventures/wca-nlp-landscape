id: ml-collective
name: ML Collective
type: ngo
website: https://mlcollective.org/
location: Distributed (US-based)
organization_size: medium
description: >
  Non-profit research lab providing research opportunities to independent and
  underrepresented researchers. Runs multiple African language NLP projects including
  AfriCaption (image captioning in 20 African languages), data augmentation for African
  MT, Nigerian language embeddings, and Yoruba QA robustness evaluation. Connected to
  the NaijaVoices speech dataset initiative. Provides mentorship, compute resources,
  and publication support to researchers working on African language technology.

