projects:
  - name: AfriCaption
    url: https://huggingface.co/datasets/mlcollective/AFRICaption
    description: >
      First image captioning dataset and model for African languages.
      8K images with captions in 20 African languages. 0.5B parameter
      vision-to-text model (SigLIP + NLLB decoder).
    languages: [yor, ibo, hau, ewe, lin, fuv, dyu, bam]
  - name: African MT Data Augmentation
    description: Data augmentation techniques for African language translation systems
    languages: [yor, ibo, hau]
  - name: Nigerian Language Embeddings (wazobia-embed)
    url: https://github.com/MlCollective/wazobia-embed
    description: Improved BGE-M3 multilingual dense embeddings for Nigerian low-resource languages
    languages: [yor, ibo, hau]
  - name: Yoruba QA Robustness
    description: Evaluating LLM resilience to typographical noise in Yoruba question-answering
    languages: [yor]

