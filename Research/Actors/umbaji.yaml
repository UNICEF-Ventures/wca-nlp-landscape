id: umbaji
name: Umbaji
type: startup
website: https://www.umbaji.org/
location: Lomé, Togo
organization_size: small
description: >
  Togo-based organization building NLP resources for Togolese languages. Developed the
  Eyaa-Tom multilingual speech corpus (30.9 hours across 10 Togolese languages) and the
  Yodi Data Hub, a community platform for crowdsourcing speech and text with fair
  compensation (415 contributors from 6 countries, 60,000+ clips collected). Fine-tuned
  Whisper and NLLB models for Togolese languages and introduced the Lom Bench, a
  community-based TTS evaluation benchmark. Uses the Nwulite Obodo License (NOODL)
  balancing open access with community ownership. Also sells robotics and hardware
  products.

key_people:
