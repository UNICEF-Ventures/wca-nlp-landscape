projects:
  - name: Wolof Maternal Health ASR
    description: >
      750-utterance Wolof dataset for maternal and reproductive health ASR.
      Fine-tuned Whisper with LoRA, reducing WER from 46.5% to 23% and
      Keyword Error Rate from 17% to 11%. Community evaluation on 1,340
      real-world utterances.
    languages: [wol]
  - name: AfriStereo
    url: https://github.com/YUX-Cultural-AI-Lab/Afri-Stereo
    description: >
      5,000+ stereotype-antistereotype pairs for evaluating LLM bias,
      grounded in Senegal, Kenya, and Nigeria. 11 LLMs evaluated.
    languages: [wol]
  - name: Kitala AI - AI Data Services
    url: https://kitala.ai/
    description: >
      Commercial arm offering LLM bias evaluation, RLHF testing via text/voice,
      culturally grounded Q&A datasets (health, finance), and voice datasets for ASR.

publications:
  - title: "AfriStereo: A Culturally Grounded Dataset for Evaluating Stereotypical Bias in Large Language Models"
    url: https://arxiv.org/abs/2511.22016
    venue: arXiv 2025
  - title: "Enhancing ASR Models for Maternal and Reproductive Health: Fine-Tuning and Real-World Evaluation in Wolof"
    venue: AfricaNLP 2026 (EACL)

