id: yux-design
name: YUX Design / Kitala AI
type: startup
website: https://yux.design/
location: Dakar, Senegal
founded: 2016
organization_size: medium
description: >
  African design and innovation firm with offices in Dakar, Accra, Lagos, Abuja,
  Brazzaville, Kigali, and Nairobi. ~50 staff including ML engineers and researchers.
  Their AI arm operates through Kitala AI (https://kitala.ai/), offering culturally
  grounded AI data services: LLM bias evaluation, RLHF testing, voice datasets for ASR,
  and domain-specific Q&A datasets. The YUX Cultural AI Lab produces open research
  including the AfriStereo bias benchmark. Recent work includes Wolof ASR fine-tuning
  for maternal and reproductive health in collaboration with Stanford University.

