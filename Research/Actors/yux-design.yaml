unicef_relevance: >
  Already a UNICEF client (via YUX Design). Wolof maternal health ASR directly
  applicable to UNICEF health programmes in Senegal. LLM bias evaluation relevant
  for responsible AI deployment. Multi-country WCA presence (Dakar, Accra, Lagos).

