# Manual benchmark entries for Ewe (ewe)
# This file is NEVER overwritten by populate_research.py.
# Add one-off benchmark results you find in papers here.

unbenchmarked_models:
  - model: Ghana-NLP/naafi-tts-demo
    model_url: https://huggingface.co/spaces/Ghana-NLP/naafi-tts-demo
    task: tts
    notes: Ewe TTS demo by GhanaNLP. No public benchmarks.

evaluations:
  llm:
    - model: goldfish-models/ewe_latn_full
      model_url: https://huggingface.co/goldfish-models/ewe_latn_full
      results:
        - test_set: FLORES-200
          source: reported
          source_url: https://arxiv.org/abs/2408.10441
          notes: "Monolingual LM trained on up to 1GB of ewe text. Lower is better."
          metrics:
            - name: Log-perplexity
              value: 128.71
