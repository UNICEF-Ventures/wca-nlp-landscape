# LanguageBench / AI Language Proficiency Monitor
# Source: https://huggingface.co/spaces/fair-forward/languagebench
# Paper: arXiv:2507.08538 (Pomerenke, Nothnagel, Ostermann 2025)
# GitHub: https://github.com/datenlabor-bmz/evals-for-every-language
# Data pulled: 2026-03-09 from fair-forward/evals-for-every-language-results
#
# IMPORTANT CAVEATS:
# - All results based on n=10 sentences per language/task â€” treat with caution
# - "Synthetic" test sets were machine-translated (Google Translate) from English
# - Human-translated test sets use original FLORES+, SIB-200, AfriMMLU, etc.
# - Top 3 models per task per language shown (out of ~37 evaluated)
# - MMLU/ARC/MGSM omitted for hau, yor, ibo, ewe, wol, lin (better data in irokobench.yaml)
#
# Datasets: FLORES+ (translation), SIB-200 (classification), MMLU, ARC, MGSM
# Metric naming: direction in metric name (e.g. SpBLEU hauâ†’en, ChrF enâ†’hau)

